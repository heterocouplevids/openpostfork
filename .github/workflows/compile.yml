name: Workflow for building app # Matches your active run header

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false # Fixes the "go.sum not found" cache warning if Go isn't in root folder

      - name: Install pnpm Package Manager
        uses: pnpm/action-setup@v4
        # Removed the forced "version: 9" line. 
        # This allows the action to automatically read and use the 11.7.0 version from your package.json.

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml' # Directs cache tool to your nested frontend directory

      - name: Build Svelte Frontend
        run: |
          cd frontend
          pnpm install
          pnpm run build

      - name: Embed UI & Build Standalone Windows EXE
        run: |
          # Insert your actual build scripts/commands here if they differ
          go build -o openpost-desktop.exe .
          
