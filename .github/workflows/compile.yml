name: Compile OpenPost Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Standalone Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # Fixed: Bumped Node.js from version 20 to 22 to satisfy Capacitor CLI constraints
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Build Svelte Frontend
        shell: bash
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Embed UI & Build Standalone Windows EXE
        shell: bash
        run: |
          go build -v -o openpost-desktop.exe .

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openpost-windows-x64
          path: openpost-desktop.exe
          if-no-files-found: error
          
